name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Tests mock all external API calls; placeholder satisfies Settings validation.
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY || 'ci-placeholder' }}
        run: pytest --no-cov -q
